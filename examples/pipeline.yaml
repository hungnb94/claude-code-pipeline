entry: clarify

steps:
  clarify:
    type: agent
    prompt: |
      Requirement: {{requirement}}
      Read the codebase and identify scope, dependencies, and clarified requirement.
      Output format: PASS: [clarified requirement]

  plan:
    type: agent
    prompt: |
      Requirement: {{clarify_output}}
      Write a step-by-step implementation plan.
      Reply: PASS: [numbered steps]

  execute:
    type: agent
    prompt: |
      Implement the following plan exactly.
      Plan: {{plan_output}}
    next: verify

  verify:
    type: shell
    commands:
      - yarn build
      - yarn test --ci
      - yarn lint
    next: review
    next_fail: fix_code
    max_visits: 5

  fix_code:
    type: agent
    agent: opencode
    prompt: |
      Fix the errors below. Only touch related files, do not refactor.
      Errors: {{verify_output}}
    next: verify

  review:
    type: agent
    prompt: |
      Review the implementation for correctness, security, and code quality.
      Reply PASS if acceptable, or FAIL: [specific issues with file:line references]
    next: done
    next_fail: fix_code

  done:
    type: agent
    prompt: |
      Session complete. Summarize what was implemented and update docs.
