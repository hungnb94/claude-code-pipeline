entry: plan

steps:
  plan:
    type: agent
    prompt: |
      Writing a step-by-step implementation plan.
    next: review_plan

  review_plan:
    type: agent
    prompt: |
      Act as a independent reviewer review implementation plan and create better plan
    next: implementation

  implementation:
    type: agent
    prompt: |
      Dispatch subagents to implement implementation plan
    next: docs

  docs:
    type: agent
    prompt: |
      Update docs (README.md, CONTEXT.md, docs/adr/*.md, docs/*.md) to reflect chagnes
    next: verify

  verify:
    type: shell
    commands:
      - npm test
    next: lint
    next_fail: fix_code
    max_visits: 9

  fix_code:
    type: agent
    prompt: |
      Fix the errors below. Only touch related files.
      Errors: {{verify_output}}
    next: verify

  lint:
    type: shell
    commands:
      - npm run lint
    next: jscpd_check
    next_fail: fix_lint
    max_visits: 9

  fix_lint:
    type: agent
    prompt: |
      Run `npm run lint` to see current lint errors. Fix all violations. Only touch files with errors. Do not change logic. After fixing, run `npm run format` to apply Prettier formatting.
    next: verify
    max_visits: 9

  jscpd_check:
    type: shell
    commands:
      - npx jscpd --min-lines 5 --min-tokens 50 --threshold 0 --ignore "node_modules/**,.pipeline/**,.claude/**" .
    next: validate_plugin
    next_fail: fix_duplicates
    max_visits: 9

  fix_duplicates:
    type: agent
    prompt: |
      Run `npx jscpd --min-lines 5 --min-tokens 50 --ignore "node_modules/**,.pipeline/**,.claude/**" .` to identify duplicate code. Refactor to eliminate all duplicates. Only touch files with duplications.
    next: jscpd_check
    max_visits: 9

  validate_plugin:
    type: shell
    commands:
      - claude plugin validate .
    next: bump_version
    next_fail: fix_plugin
    max_visits: 9

  fix_plugin:
    type: agent
    prompt: |
      The plugin validation failed. Fix the errors in .claude-plugin/plugin.json and .claude-plugin/marketplace.json to make `claude plugin validate .` pass.
      Errors: {{validate_plugin_output}}
    next: validate_plugin
    max_visits: 9

  bump_version:
    type: agent
    prompt: |
      Analyze all changes made in this pipeline run and decide the appropriate semantic version bump for this project.

      Versioning rules (you decide which applies):
      - major (X.0.0): breaking changes — existing behavior removed or incompatible API changes
      - minor (x.Y.0): new functionality added in a backward-compatible way
      - patch (x.y.Z): bug fixes, refactors, docs, or other non-functional changes

      Steps:
      1. Read the current version from package.json
      2. Run `git diff origin/main -- package.json`.
         - Non-empty diff (version differs from origin/main) means a previous pipeline run on this branch ALREADY bumped it — skip the bump and output "version already bumped on this branch".
         - Empty diff (version matches origin/main) means it has NOT been bumped yet — proceed to step 3.
      3. Run `git diff main --name-only` to see which files changed, then read the commit messages with `git log main..HEAD --oneline` to understand what was done
      4. Choose the appropriate bump level and justify it in one sentence
      5. Update the version field in all three files: package.json, .claude-plugin/plugin.json, .claude-plugin/marketplace.json (plugins[0].version) to the new version
    next: pr
    max_visits: 1

  pr:
    type: agent
    prompt: |
      Create/Update PR based on changes
    next: review_pr

  review_pr:
    type: agent
    prompt: |
      Review pull request and auto fix found issues
