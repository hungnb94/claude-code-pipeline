entry: plan

steps:
  plan:
    type: agent
    prompt: |
      /writing-plans writing a step-by-step implementation plan.
    next: review_plan

  review_plan:
    type: agent
    prompt: |
      Act as a independent reviewer review implementation plan and create better plan
    next: execute

  execute:
    type: agent
    prompt: |
      Dispatch subagents to implement implementation plan
