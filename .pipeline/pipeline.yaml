entry: plan

steps:
  plan:
    type: agent
    prompt: |
      /writing-plans writing a step-by-step implementation plan.
    next: review_plan

  review_plan:
    type: agent
    prompt: |
      Act as a independent reviewer review implementation plan and create better plan
    next: implementation

  implementation:
    type: agent
    prompt: |
      Dispatch subagents to implement implementation plan
    next: docs

  docs:
    type: agent
    prompt: |
      Update docs (README.md, CONTEXT.md, docs/adr/*.md, docs/*.md) to reflect chagnes
    next: verify

  verify:
    type: shell
    commands:
      - yarn test
    next: pr
    next_fail: fix_code
    max_visits: 5

  fix_code:
    type: agent
    prompt: |
      Fix the errors below. Only touch related files.
      Errors: {{verify_output}}
    next: pr

  pr:
    type: agent
    prompt: |
      Create/Update PR based on changes
    next: review_pr

  review_pr:
    type: agent
    prompt: |
      Review pull request and auto fix found issues
